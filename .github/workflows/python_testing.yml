name: Test kecpkg-tools

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 6
      fail-fast: False
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install OS dependencies
      run: |
        sudo apt-get install gpg --yes

    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -U setuptools wheel build
        pip install -r requirements.txt

    - name: Perform Testing
      run: |
        pip install pytest pytest-cov coverage
        pip install -e . --quiet
        pytest --cov=kecpkg tests

    - name: Upload coverage to coveralls.io
      if: matrix.python-version == 3.14
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: |
        pip install coveralls
        coveralls

    - name: Check docs and distribution
      if: matrix.python-version == 3.14
      run: |
        pip install flake8 pydocstyle check-manifest readme_renderer[md] twine>=2.0.0 build

        flake8 kecpkg --count --show-source --statistics
        pydocstyle kecpkg
        check-manifest
        python -m build
        twine check dist/*
